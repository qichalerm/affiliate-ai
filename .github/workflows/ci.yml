name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies (root)
        run: bun install --frozen-lockfile

      - name: Install dependencies (web)
        run: cd src/web && bun install --frozen-lockfile

      - name: TypeScript check
        run: bun run typecheck
        continue-on-error: true # warn-only initially; turn on once clean

      - name: Lint
        run: bun run lint
        continue-on-error: true

      - name: Verify env schema
        run: |
          # Just check that env.ts compiles + schema parses
          bun run --silent src/lib/env.ts || echo "warn: env.ts standalone check failed (expected if missing vars)"

  smoke:
    runs-on: ubuntu-latest
    needs: typecheck-lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/test?sslmode=disable
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      DOMAIN_NAME: example.com
      DEBUG_DRY_RUN: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          bun install --frozen-lockfile
          cd src/web && bun install --frozen-lockfile

      - name: Push schema to test DB
        run: bun run db:push

      - name: Smoke test
        run: bun run smoke
        continue-on-error: false

  docker-build:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (cache only — don't push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: affiliate-bot:ci
