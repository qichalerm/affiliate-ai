
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="PriceTH — Check prices before you shop">
  <!-- Background gradient: white → soft blue -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EEF4FF"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.15" r="0.6">
      <stop offset="0" stop-color="#0B5FFF" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#0B5FFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.15" cy="0.95" r="0.45">
      <stop offset="0" stop-color="#E11D48" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#E11D48" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Logo mark (large) -->
  <g transform="translate(100, 180)">
    <rect width="160" height="160" rx="36" fill="#0B5FFF"/>
    <path d="M48 48h64" stroke="#FFFFFF" stroke-opacity="0.55" stroke-width="8" stroke-linecap="round"/>
    <path d="M80 50v76" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round"/>
    <path d="M44 90l36 36 36-36" stroke="#FFFFFF" stroke-width="13" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="124" cy="124" r="11" fill="#E11D48"/>
  </g>

  <!-- Wordmark -->
  <text x="290" y="280" font-family="'IBM Plex Sans Thai', system-ui, sans-serif" font-size="100" font-weight="800" fill="#0F172A" letter-spacing="-3">
    Price<tspan fill="#0B5FFF">TH</tspan>
  </text>

  <!-- Tagline (Thai) -->
  <text x="100" y="430" font-family="'IBM Plex Sans Thai', system-ui, sans-serif" font-size="56" font-weight="700" fill="#0F172A" letter-spacing="-1.5">
    เช็คราคาก่อนช้อป
    <tspan fill="#0B5FFF">  ประหยัดได้ทุกครั้ง</tspan>
  </text>

  <!-- Subline -->
  <text x="100" y="490" font-family="'IBM Plex Sans Thai', system-ui, sans-serif" font-size="28" font-weight="500" fill="#475569">
    เปรียบเทียบราคา Shopee Thailand · อัปเดตทุก 4 ชั่วโมง · ฟรี
  </text>

  <!-- Trust band — 3 stat pills -->
  <g transform="translate(100, 540)" font-family="'IBM Plex Sans Thai', system-ui, sans-serif" font-size="22" font-weight="600">
    <!-- Pill 1 -->
    <rect x="0" y="0" width="220" height="50" rx="25" fill="#FFFFFF" stroke="#E2E8F0"/>
    <circle cx="22" cy="25" r="6" fill="#10B981"/>
    <text x="40" y="33" fill="#334155">อัปเดต Real-time</text>
    <!-- Pill 2 -->
    <rect x="240" y="0" width="200" height="50" rx="25" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="260" y="33" fill="#334155">⚡  Shopee Verified</text>
    <!-- Pill 3 -->
    <rect x="460" y="0" width="160" height="50" rx="25" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="480" y="33" fill="#334155">🇹🇭  ภาษาไทย/EN/中/日</text>
  </g>

  <!-- Domain bottom right -->
  <text x="1100" y="595" font-family="'IBM Plex Sans Thai', system-ui, sans-serif" font-size="24" font-weight="700" fill="#94A3B8" text-anchor="end">
    price-th.com
  </text>
</svg>
