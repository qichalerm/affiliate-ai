
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="PriceTH">
  <!-- Rounded indigo container = trust + brand color -->
  <rect width="64" height="64" rx="14" fill="#0B5FFF"/>

  <!-- Subtle top accent line — reads as a price label / receipt edge -->
  <path d="M18 19h28" stroke="#FFFFFF" stroke-opacity="0.55" stroke-width="3.2" stroke-linecap="round"/>

  <!-- Stylized ฿ — Thai Baht symbol stem (vertical line) crossed by chevron-down (price drop) -->
  <!-- Stem -->
  <path d="M32 20v28" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
  <!-- Big chevron pointing down — "price going down" -->
  <path d="M18 36l14 14 14-14" stroke="#FFFFFF" stroke-width="5.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Tiny rose accent dot bottom-right = deal badge color -->
  <circle cx="50" cy="50" r="4" fill="#E11D48"/>
</svg>
